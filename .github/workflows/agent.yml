name: Price Monitor

on:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run agent
        run: python agent.py
